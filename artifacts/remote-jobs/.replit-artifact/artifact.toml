kind = "web"
previewPath = "/"
title = "Remote Job Aggregator"
version = "1.0.0"
id = "artifacts/remote-jobs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24790

[services.development]
run = "pnpm --filter @workspace/remote-jobs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remote-jobs", "run", "build" ]
publicDir = "artifacts/remote-jobs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24790"
BASE_PATH = "/"
